<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>★ letters ★</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <style>
    .letters-page { position:relative; z-index:1; min-height:100dvh; display:flex; flex-direction:column; }

    .top-bar { display:flex; align-items:center; gap:16px; padding:22px 20px 14px; padding-top:calc(22px + env(safe-area-inset-top)); position:sticky; top:0; background:rgba(15,15,35,.92); backdrop-filter:blur(6px); z-index:10; border-bottom:3px solid var(--yellow); }
    .back-btn { background:none; border:3px solid var(--yellow); color:var(--yellow); font-family:var(--font); font-size:.45rem; padding:8px 12px; cursor:pointer; letter-spacing:1px; -webkit-tap-highlight-color:transparent; transition:background .1s,color .1s; }
    .back-btn:active { background:var(--yellow); color:var(--bg); }
    .page-title { font-size:clamp(.5rem,2.5vw,.75rem); color:var(--yellow); letter-spacing:3px; text-shadow:2px 2px 0 rgba(255,217,61,.25); }

    /* envelope grid */
    .env-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; padding:16px; flex:1; }
    @media(min-width:500px){ .env-grid { grid-template-columns:repeat(3,1fr); } }

    .env-card { position:relative; background:transparent; border:none; box-shadow:none; padding:16px 10px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:10px; -webkit-tap-highlight-color:transparent; transition:transform .1s,opacity .1s; }
    .env-card:active { transform:scale(.93); opacity:.75; }

    .env-icon { font-size:2rem; animation:blink 3s step-end infinite; }
    .env-title { font-size:.38rem; color:var(--yellow); letter-spacing:1px; text-align:center; word-break:break-word; }
    .env-date  { font-size:.28rem; color:rgba(255,255,255,.3); letter-spacing:1px; }

    /* empty */
    .sec-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:60px 24px; text-align:center; }
    .sec-empty__icon { font-size:2.5rem; }
    .sec-empty__text { font-size:.42rem; color:rgba(255,255,255,.25); line-height:2.4; letter-spacing:1px; }

    /* ── Letter modal ── */
    .letter-modal { position:fixed; inset:0; background:rgba(0,0,0,.9); display:flex; align-items:center; justify-content:center; z-index:500; opacity:0; pointer-events:none; transition:opacity .2s; padding:20px; padding-top:calc(20px + env(safe-area-inset-top)); padding-bottom:calc(20px + env(safe-area-inset-bottom)); }
    .letter-modal.open { opacity:1; pointer-events:auto; }

    .letter-paper { background:#1a1200; border:4px solid var(--yellow); box-shadow:8px 8px 0 0 var(--yellow); max-width:480px; width:100%; max-height:80dvh; display:flex; flex-direction:column; overflow:hidden; }
    .letter-paper__header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:2px solid rgba(255,217,61,.2); }
    .letter-paper__title { font-size:.5rem; color:var(--yellow); letter-spacing:2px; }
    .letter-paper__close { background:none; border:2px solid var(--yellow); color:var(--yellow); font-family:var(--font); font-size:.38rem; padding:6px 10px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .letter-paper__close:active { background:var(--yellow); color:var(--bg); }
    .letter-paper__body { padding:18px 16px 20px; overflow-y:auto; flex:1; }
    .letter-paper__text { font-size:.4rem; color:rgba(255,255,255,.85); line-height:2.4; letter-spacing:1px; white-space:pre-wrap; word-break:break-word; }
    .letter-paper__footer { padding:10px 16px; font-size:.3rem; color:rgba(255,217,61,.3); letter-spacing:1px; text-align:right; border-top:1px solid rgba(255,217,61,.1); }
  </style>
</head>
<body>
<canvas class="stars" id="stars"></canvas>

<div class="letters-page">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">&#60; back</button>
    <span class="page-title">[ letters ]</span>
  </div>
  <div class="env-grid" id="envGrid"></div>
  <div class="sec-empty" id="secEmpty" style="display:none">
    <div class="sec-empty__icon">✉️</div>
    <p class="sec-empty__text">no letters yet<br>check back soon ♡</p>
  </div>
</div>

<!-- Letter modal -->
<div class="letter-modal" id="letterModal">
  <div class="letter-paper">
    <div class="letter-paper__header">
      <span class="letter-paper__title" id="modalTitle"></span>
      <button class="letter-paper__close" id="modalClose">[ x ]</button>
    </div>
    <div class="letter-paper__body">
      <p class="letter-paper__text" id="modalText"></p>
    </div>
    <div class="letter-paper__footer" id="modalDate"></div>
  </div>
</div>

<script>
(function(){
  const c=document.getElementById('stars'),x=c.getContext('2d');let s=[];
  const r=()=>{c.width=innerWidth;c.height=innerHeight;};
  const cr=()=>{s=Array.from({length:100},()=>({x:Math.random()*c.width,y:Math.random()*c.height,sz:Math.random()<.6?1:2,p:Math.random()*Math.PI*2,sp:.003+Math.random()*.008}));};
  const d=()=>{x.clearRect(0,0,c.width,c.height);s.forEach(t=>{t.p+=t.sp;const a=.3+.7*Math.abs(Math.sin(t.p));x.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;x.fillRect(Math.round(t.x),Math.round(t.y),t.sz,t.sz);});requestAnimationFrame(d);};
  window.addEventListener('resize',()=>{r();cr();});r();cr();requestAnimationFrame(d);
})();

const DB_NAME='her-memories',DB_VER=2,STORE='letters';
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>{const db=e.target.result;['photos','letters','songs','mystery'].forEach(n=>{if(!db.objectStoreNames.contains(n))db.createObjectStore(n,{keyPath:'id',autoIncrement:true});});};req.onsuccess=e=>res(e.target.result);req.onerror=()=>rej(req.error);});}
function dbAll(db,store){return new Promise((res,rej)=>{const req=db.transaction(store,'readonly').objectStore(store).getAll();req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);});}

const modal=document.getElementById('letterModal');
const modalTitle=document.getElementById('modalTitle');
const modalText=document.getElementById('modalText');
const modalDate=document.getElementById('modalDate');

openDB().then(db=>dbAll(db,STORE)).then(letters=>{
  const grid=document.getElementById('envGrid');
  const empty=document.getElementById('secEmpty');
  if(letters.length===0){empty.style.display='flex';return;}

  letters.forEach(letter=>{
    const card=document.createElement('div'); card.className='env-card';
    const icon=document.createElement('div'); icon.className='env-icon'; icon.textContent='✉️';
    const title=document.createElement('div'); title.className='env-title'; title.textContent=letter.title||'a letter for you';
    const date=document.createElement('div'); date.className='env-date'; date.textContent=new Date(letter.timestamp).toLocaleDateString();
    card.append(icon,title,date);
    card.addEventListener('click',()=>openLetter(letter));
    grid.appendChild(card);
  });
});

function openLetter(letter){
  modalTitle.textContent=letter.title||'a letter for you';
  modalText.textContent='';
  modalDate.textContent=new Date(letter.timestamp).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  modal.classList.add('open');
  document.body.style.overflow='hidden';
  // typewriter effect
  const text=letter.body||'';
  let i=0;
  const iv=setInterval(()=>{
    if(i>=text.length){clearInterval(iv);return;}
    modalText.textContent+=text[i++];
  },18);
}

document.getElementById('modalClose').addEventListener('click',()=>{modal.classList.remove('open');document.body.style.overflow='';});
modal.addEventListener('click',e=>{if(e.target===modal){modal.classList.remove('open');document.body.style.overflow='';}});
</script>
</body>
</html>
