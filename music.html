<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>★ music ★</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <style>
    .music-page { position:relative; z-index:1; min-height:100dvh; display:flex; flex-direction:column; }

    .top-bar { display:flex; align-items:center; gap:16px; padding:22px 20px 14px; padding-top:calc(22px + env(safe-area-inset-top)); position:sticky; top:0; background:rgba(15,15,35,.92); backdrop-filter:blur(6px); z-index:10; border-bottom:3px solid var(--cyan); }
    .back-btn { background:none; border:3px solid var(--cyan); color:var(--cyan); font-family:var(--font); font-size:.45rem; padding:8px 12px; cursor:pointer; letter-spacing:1px; -webkit-tap-highlight-color:transparent; transition:background .1s,color .1s; }
    .back-btn:active { background:var(--cyan); color:var(--bg); }
    .page-title { font-size:clamp(.5rem,2.5vw,.75rem); color:var(--cyan); letter-spacing:3px; text-shadow:2px 2px 0 rgba(107,207,255,.25); }

    /* header disk */
    .disk-header { display:flex; flex-direction:column; align-items:center; gap:10px; padding:24px 16px 10px; }
    .disk-header svg { animation:spin 4s linear infinite; }
    .disk-header__sub { font-size:.38rem; color:rgba(107,207,255,.5); letter-spacing:2px; }

    /* playlist */
    .playlist { display:flex; flex-direction:column; padding:8px 16px 60px; gap:8px; }

    .song-card { display:flex; align-items:center; gap:14px; background:#001a26; border:3px solid var(--cyan); box-shadow:4px 4px 0 0 var(--cyan); padding:14px 16px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:transform .1s,box-shadow .1s; }
    .song-card:active { transform:translate(3px,3px); box-shadow:1px 1px 0 0 var(--cyan); }
    .song-card--nolink { cursor:default; }
    .song-card--nolink:active { transform:none; box-shadow:4px 4px 0 0 var(--cyan); }

    .song-num { font-size:.38rem; color:rgba(107,207,255,.4); letter-spacing:1px; min-width:24px; }
    .song-info { flex:1; min-width:0; display:flex; flex-direction:column; gap:5px; }
    .song-title { font-size:.42rem; color:var(--white); letter-spacing:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .song-artist { font-size:.32rem; color:rgba(107,207,255,.55); letter-spacing:1px; }
    .song-play { font-size:.45rem; color:var(--cyan); flex-shrink:0; }

    /* note animation */
    .note-float { position:fixed; pointer-events:none; z-index:999; font-size:1.2rem; animation:noteRise 1.2s ease-out forwards; }
    @keyframes noteRise { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-80px) scale(1.3);} }

    /* empty */
    .sec-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:60px 24px; text-align:center; }
    .sec-empty__icon { font-size:2.5rem; }
    .sec-empty__text { font-size:.42rem; color:rgba(255,255,255,.25); line-height:2.4; letter-spacing:1px; }
  </style>
</head>
<body>
<canvas class="stars" id="stars"></canvas>

<div class="music-page">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">&#60; back</button>
    <span class="page-title">[ music ]</span>
  </div>

  <div class="disk-header">
    <svg viewBox="0 0 16 16" shape-rendering="crispEdges" width="64" height="64" fill="#6bcfff">
      <rect x="4" y="0" width="8" height="1"/><rect x="2" y="1" width="12" height="1"/>
      <rect x="1" y="2" width="14" height="2"/><rect x="0" y="4" width="16" height="8"/>
      <rect x="1" y="12" width="14" height="2"/><rect x="2" y="14" width="12" height="1"/>
      <rect x="4" y="15" width="8" height="1"/>
      <rect x="3" y="3" width="10" height="10" fill="#0d1f26"/>
      <rect x="4" y="4" width="8" height="8"/>
      <rect x="5" y="5" width="6" height="6" fill="#0d1f26"/>
      <rect x="7" y="7" width="2" height="2" fill="#6bcfff"/>
      <rect x="4" y="2" width="1" height="1" fill="#ffffff"/>
    </svg>
    <p class="disk-header__sub">our songs ♡</p>
  </div>

  <div class="playlist" id="playlist"></div>
  <div class="sec-empty" id="secEmpty" style="display:none">
    <div class="sec-empty__icon">💿</div>
    <p class="sec-empty__text">no songs yet<br>check back soon ♡</p>
  </div>
</div>

<script>
(function(){
  const c=document.getElementById('stars'),x=c.getContext('2d');let s=[];
  const r=()=>{c.width=innerWidth;c.height=innerHeight;};
  const cr=()=>{s=Array.from({length:100},()=>({x:Math.random()*c.width,y:Math.random()*c.height,sz:Math.random()<.6?1:2,p:Math.random()*Math.PI*2,sp:.003+Math.random()*.008}));};
  const d=()=>{x.clearRect(0,0,c.width,c.height);s.forEach(t=>{t.p+=t.sp;const a=.3+.7*Math.abs(Math.sin(t.p));x.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;x.fillRect(Math.round(t.x),Math.round(t.y),t.sz,t.sz);});requestAnimationFrame(d);};
  window.addEventListener('resize',()=>{r();cr();});r();cr();requestAnimationFrame(d);
})();

const DB_NAME='her-memories',DB_VER=2;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>{const db=e.target.result;['photos','letters','songs','mystery'].forEach(n=>{if(!db.objectStoreNames.contains(n))db.createObjectStore(n,{keyPath:'id',autoIncrement:true});});};req.onsuccess=e=>res(e.target.result);req.onerror=()=>rej(req.error);});}
function dbAll(db,store){return new Promise((res,rej)=>{const req=db.transaction(store,'readonly').objectStore(store).getAll();req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);});}

openDB().then(db=>dbAll(db,'songs')).then(songs=>{
  const pl=document.getElementById('playlist');
  const empty=document.getElementById('secEmpty');
  if(songs.length===0){empty.style.display='flex';return;}

  songs.forEach((song,i)=>{
    const card=document.createElement('div');
    card.className='song-card'+(song.link?'':' song-card--nolink');

    const num=document.createElement('div'); num.className='song-num'; num.textContent=String(i+1).padStart(2,'0');
    const info=document.createElement('div'); info.className='song-info';
    const title=document.createElement('div'); title.className='song-title'; title.textContent=song.title||'untitled';
    const artist=document.createElement('div'); artist.className='song-artist'; artist.textContent=song.artist||'';
    info.append(title,artist);
    const play=document.createElement('div'); play.className='song-play'; play.textContent=song.link?'▶':'♪';

    card.append(num,info,play);
    if(song.link){
      card.addEventListener('click',e=>{
        spawnNote(e);
        setTimeout(()=>window.open(song.link,'_blank'),300);
      });
    }
    pl.appendChild(card);
  });
});

function spawnNote(e){
  const n=document.createElement('div'); n.className='note-float';
  n.textContent=['♪','♫','♬'][Math.floor(Math.random()*3)];
  n.style.left=(e.clientX-10)+'px'; n.style.top=(e.clientY-10)+'px';
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),1200);
}
</script>
</body>
</html>
